<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Giovana 20: Luan Santana Edition</title>
    <link rel="icon" type="image/png" href="imagens/image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@400;600;800&family=Oswald:wght@600;700&family=Playfair+Display:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    <style>
      :root {
        --silver: #c7c7c7;
        --silver-dark: #9fa1a6;
        --white: #ffffff;
        --ink: #1b1b1b;
        --shine: #f4f4f4;
        --fly-duration: 5s;
        --photo-duration: 3s;
        --details-delay: calc(var(--fly-duration) + var(--photo-duration));
        --glass-bg: rgba(255, 255, 255, 0.15);
        --glass-border: 1px solid rgba(255, 255, 255, 0.35);
        --glass-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        --glass-blur: blur(6px);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Quicksand", "Cormorant Garamond", serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 20%, #e8e8ec 0%, #dddde2 35%, #d4d5da 100%);
        height: 100dvh;
        overflow: hidden;
      }

      .bg-shapes {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .bg-shapes span {
        position: absolute;
        border: 2px solid rgba(199, 199, 199, 0.45);
        border-radius: 999px;
        filter: blur(0.2px);
        animation: float-orbit 22s ease-in-out infinite;
      }

      .bg-shapes span:nth-child(1) {
        width: 320px;
        height: 320px;
        top: 8%;
        left: -80px;
        animation-duration: 26s;
      }

      .bg-shapes span:nth-child(2) {
        width: 220px;
        height: 220px;
        top: 68%;
        left: 12%;
        animation-duration: 30s;
        animation-delay: -8s;
      }

      .bg-shapes span:nth-child(3) {
        width: 360px;
        height: 360px;
        top: 10%;
        right: -140px;
        animation-duration: 34s;
        animation-delay: -14s;
      }

      @keyframes float-orbit {
        0% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(18px, -14px);
        }
        100% {
          transform: translate(0, 0);
        }
      }

      .luan-fly {
        position: fixed;
        top: 18vh;
        left: 0;
        width: min(1280px, 110vw);
        z-index: 2;
        pointer-events: none;
        filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.25));
        will-change: transform;
      }

      @keyframes luan-flight {
        0% {
          transform: translate3d(-120%, 0vh, 0) rotate(-3deg);
        }
        16% {
          transform: translate3d(-80%, -4vh, 0) rotate(-1deg);
        }
        33% {
          transform: translate3d(-35%, 4vh, 0) rotate(2deg);
        }
        50% {
          transform: translate3d(10%, -4vh, 0) rotate(-1deg);
        }
        67% {
          transform: translate3d(55%, 4vh, 0) rotate(2deg);
        }
        84% {
          transform: translate3d(100%, -3vh, 0) rotate(-1deg);
        }
        100% {
          transform: translate3d(140%, 0vh, 0) rotate(0deg);
        }
      }

      .page {
        position: relative;
        z-index: 1;
        padding: 56px 6vw 80px;
        display: grid;
        gap: 36px;
        align-items: center;
        opacity: 1;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .badge {
        border: 1px solid var(--silver);
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--silver-dark);
        background: rgba(255, 255, 255, 0.6);
      }

      .invite {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 36px;
        align-items: center;
      }

      .invite-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.3rem, 4vw, 3.4rem);
        line-height: 1.05;
        letter-spacing: 0.6px;
      }

      .invite-subtitle {
        margin-top: 12px;
        font-size: 1.1rem;
        color: #333;
      }

      .invite-cta {
        margin-top: 22px;
        display: inline-flex;
        gap: 10px;
        align-items: center;
        padding: 12px 20px;
        border-radius: 999px;
        border: 1px solid var(--silver);
        background: linear-gradient(120deg, var(--white), var(--shine));
        font-weight: 600;
        text-decoration: none;
        color: var(--ink);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      }

      .invite-cta span {
        font-size: 18px;
      }

      .hero-animate {
        opacity: 0;
        transform: translateY(32px);
        filter: blur(8px);
      }

      .glow-animate {
        opacity: 0;
        transform: scale(0.96);
      }

      .intro-screen {
        position: fixed;
        inset: 0;
        z-index: 4;
        display: grid;
        place-items: center;
        place-content: center;
        gap: 32px;
        text-align: center;
        padding: 0 8vw;
        background: radial-gradient(circle at top, #ffffff 0%, #f2f2f2 55%, #e3e4e8 100%);
      }

      .intro-title {
        font-family: "Cinzel", serif;
        font-size: clamp(2.2rem, 5vw, 3.2rem);
        letter-spacing: 2px;
        text-transform: uppercase;
        line-height: 1.2;
      }

      .intro-button {
        border: var(--glass-border);
        padding: 18px 48px;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 1.05rem;
        background: var(--glass-bg);
        box-shadow: var(--glass-shadow);
        cursor: pointer;
        animation: pulse 1.8s ease-in-out infinite;
      }

      .started .intro-screen {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease-out;
      }

      .started .luan-fly {
        animation: luan-flight var(--fly-duration) linear forwards;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(159, 161, 166, 0.4);
        }
        50% {
          transform: scale(1.04);
          box-shadow: 0 0 0 16px rgba(159, 161, 166, 0);
        }
      }

      @keyframes photo-in {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes photo-out {
        to {
          opacity: 0;
          transform: translateY(-12px);
        }
      }

      @keyframes details-in {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .photo-card {
        position: relative;
        border-radius: 24px;
        overflow: hidden;
        border: none;
        background: transparent;
        box-shadow: none;
        min-height: 320px;
        width: min(520px, 100%);
        justify-self: end;
        transform: translateX(6vw);
      }

      .photo-stage {
        display: grid;
        gap: 8px;
      }

      .stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 32px 6vw;
        text-align: center;
        opacity: 0;
        pointer-events: none;
      }

      .stage-fly {
        background: url("imagens/show.jpg") center center / cover no-repeat;
      }

      .stage-details {
        place-items: center;
        padding: 48px 6vw 140px;
        pointer-events: auto;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      .balloons {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        opacity: 0;
      }

      .started .stage-details .balloons {
        opacity: 1;
        transition: opacity 0.6s ease-out;
      }

      .balloon {
        position: absolute;
        bottom: -20vh;
        width: 70px;
        height: 90px;
        --scale: 1;
        --drift: 24px;
        background: url("imagens/balao.png") center / contain no-repeat;
        filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.18));
        animation: balloon-rise 12s linear infinite;
      }

      .balloon:nth-child(1)  { left:  6%; animation-duration: 10s;   animation-delay:   0s; --scale: 0.95; --drift: 22px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(25deg)  saturate(1.2); }
      .balloon:nth-child(2)  { left: 16%; animation-duration: 11s;   animation-delay:  -6s; --scale: 0.85; --drift: 28px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(145deg) saturate(1.3); }
      .balloon:nth-child(3)  { left: 26%; animation-duration: 10.5s; animation-delay:  -8s; --scale: 1.05; --drift: 26px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(250deg) saturate(1.25); }
      .balloon:nth-child(4)  { left: 36%; animation-duration: 12s;   animation-delay: -10s; --scale: 0.9;  --drift: 30px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(320deg) saturate(1.2); }
      .balloon:nth-child(5)  { left: 46%; animation-duration: 9.5s;  animation-delay:  -3s; --scale: 0.9;  --drift: 20px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(80deg)  saturate(1.3); }
      .balloon:nth-child(6)  { left: 56%; animation-duration: 11.5s; animation-delay:  -7s; --scale: 0.8;  --drift: 26px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(200deg) saturate(1.2); }
      .balloon:nth-child(7)  { left: 66%; animation-duration: 10.8s; animation-delay:  -9s; --scale: 0.88; --drift: 24px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(15deg)  saturate(1.35); }
      .balloon:nth-child(8)  { left: 76%; animation-duration: 12.5s; animation-delay: -11s; --scale: 1.1;  --drift: 32px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(280deg) saturate(1.25); }
      .balloon:nth-child(9)  { left: 86%; animation-duration: 10.2s; animation-delay:  -4s; --scale: 0.92; --drift: 22px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(60deg)  saturate(1.2); }
      .balloon:nth-child(10) { left: 94%; animation-duration: 11.8s; animation-delay: -13s; --scale: 1.0;  --drift: 28px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(180deg) saturate(1.3); }
      .balloon:nth-child(11) { left: 11%; animation-duration: 9.8s;  animation-delay:  -2s; --scale: 0.87; --drift: 20px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(300deg) saturate(1.25); }
      .balloon:nth-child(12) { left: 21%; animation-duration: 13s;   animation-delay: -15s; --scale: 1.02; --drift: 30px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(100deg) saturate(1.2); }
      .balloon:nth-child(13) { left: 42%; animation-duration: 10.4s; animation-delay:  -5s; --scale: 0.93; --drift: 24px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(220deg) saturate(1.3); }
      .balloon:nth-child(14) { left: 62%; animation-duration: 11.2s; animation-delay: -12s; --scale: 0.82; --drift: 26px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(40deg)  saturate(1.35); }
      .balloon:nth-child(15) { left: 72%; animation-duration: 9.2s;  animation-delay:  -1s; --scale: 1.08; --drift: 22px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(160deg) saturate(1.2); }
      .balloon:nth-child(16) { left: 82%; animation-duration: 12.8s; animation-delay:  -8s; --scale: 0.96; --drift: 28px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18)) hue-rotate(340deg) saturate(1.25); }

      @keyframes balloon-rise {
        0% {
          transform: translateY(0) translateX(0) scale(var(--scale, 1));
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        25% {
          transform: translateY(-35vh) translateX(calc(var(--drift) * -0.6)) scale(var(--scale, 1));
        }
        50% {
          transform: translateY(-70vh) translateX(var(--drift)) scale(var(--scale, 1));
        }
        75% {
          transform: translateY(-105vh) translateX(calc(var(--drift) * -0.4)) scale(var(--scale, 1));
        }
        100% {
          transform: translateY(-140vh) translateX(calc(var(--drift) * 0.5)) scale(var(--scale, 1));
          opacity: 0;
        }
      }

      .stage-content {
        width: min(980px, 100%);
        display: grid;
        justify-items: center;
        gap: 14px;
      }

      .stage-photo {
        text-align: left;
      }

      .stage-photo-content {
        width: min(1100px, 100%);
        grid-template-columns: minmax(220px, 0.9fr) minmax(260px, 1.2fr);
        align-items: center;
        gap: 28px;
        justify-items: stretch;
      }

      .started .stage-fly {
        animation: stage-fly var(--fly-duration) ease-out forwards;
      }

      .started .stage-photo {
        animation: stage-photo var(--photo-duration) ease-in-out var(--fly-duration) forwards;
      }

      .started .stage-details {
        animation: details-in 0.7s ease-out var(--details-delay) forwards;
      }

      .photo-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        mix-blend-mode: multiply;
        filter: contrast(1.05) saturate(1.08);
      }

      .caption-block {
        max-width: 420px;
        justify-self: start;
        text-align: left;
      }

      .photo-caption {
        font-weight: 800;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        font-size: clamp(1.9rem, 3.4vw, 3rem);
        color: #1b1b1b;
        text-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      }

      .details-layout {
        display: grid;
        gap: 12px;
        width: min(980px, 100%);
      }

      .details-header {
        display: grid;
        gap: 4px;
        text-align: center;
        margin-bottom: 6px;
      }

      .details-title {
        font-family: "Cinzel", serif;
        font-size: clamp(2.4rem, 6vw, 3.4rem);
        line-height: 1.05;
        text-transform: uppercase;
        letter-spacing: 2px;
        white-space: nowrap;
        font-weight: 500;
      }

      .details-subtitle {
        font-weight: 600;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        color: #5c5c5c;
      }

      .details-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px 16px;
      }

      .detail-item {
        display: grid;
        gap: 6px;
        padding: 16px 18px;
        border-radius: 20px;
        border: var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--glass-shadow);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
      }

      .detail-label {
        font-size: 0.88rem;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: #7a7a7a;
      }

      .detail-value {
        font-size: 1.2rem;
        font-weight: 600;
        color: #1f1f1f;
      }

      .detail-value-compact {
        font-size: 0.95rem;
        font-weight: 600;
        color: #1f1f1f;
      }

      .details-footer {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
        gap: 18px;
        align-items: center;
        padding: 18px;
      }

      .detail-item--full {
        grid-column: 1 / -1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px 18px;
        border-radius: 20px;
        border: var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--glass-shadow);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
      }

      .detail-item--actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px 18px;
        border-radius: 20px;
        border: var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--glass-shadow);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        justify-content: center;
        align-items: center;
      }

      .detail-value-row {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .detail-value-row .detail-value {
        flex: 1;
        text-align: center;
      }

      .detail-actions {
        display: flex;
        flex-direction: row;
        gap: 12px;
        flex-shrink: 0;
        align-items: center;
        align-self: center;
      }

      .detail-action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        color: #1a1a1a;
        text-decoration: none;
        transition: transform 0.15s ease;
        flex-shrink: 0;
        background: none;
        border: none;
        padding: 0;
      }

      .detail-action-btn:active {
        transform: scale(0.9);
      }

      .detail-action-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--glass-shadow);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        display: grid;
        place-items: center;
      }

      .detail-action-label {
        font-size: 0.72rem;
        font-weight: 600;
        font-family: "Quicksand", sans-serif;
        letter-spacing: 0.3px;
        color: #555;
        text-align: center;
      }

      .detail-action-btn.copied .detail-action-icon svg {
        stroke: #2e7d32;
      }

      .details-card {
        overflow: hidden;
        border-radius: 20px;
        border: var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--glass-shadow);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
      }

      .footer-note {
        font-size: 1.1rem;
        color: #4a4a4a;
        line-height: 1.5;
        padding: 0;
      }

      .footer-note strong {
        color: #1b1b1b;
      }

      .footer-photo {
        border-radius: 16px;
        overflow: hidden;
        border: var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--glass-shadow);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        aspect-ratio: 1 / 1;
        width: 100%;
        max-width: 160px;
        position: relative;
        margin: 0 auto;
      }

      .footer-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transition: opacity 0.8s ease;
        border-radius: inherit;
      }

      .footer-photo img.active {
        opacity: 1;
      }

      @keyframes stage-fly {
        0% {
          opacity: 1;
        }
        80% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }


      @keyframes stage-photo {
        0% {
          opacity: 0;
          transform: translateY(18px);
        }
        15% {
          opacity: 1;
          transform: translateY(0);
        }
        85% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(-12px);
        }
      }

      footer {
        font-size: 0.9rem;
        color: #555;
      }

      .sound-toggle {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 3;
        border: var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--glass-shadow);
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
      }

      .copy-toast {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        background: rgba(30, 30, 30, 0.88);
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        padding: 12px 24px;
        border-radius: 999px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 20;
        white-space: nowrap;
      }

      .copy-toast.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      /* ── Apple Music player ── */
      .mini-player {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 18px 12px 14px;
        border-radius: 999px;
        border: var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--glass-shadow);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        white-space: nowrap;
        transition: opacity 0.4s ease, transform 0.4s ease;
      }

      .mini-player[hidden] {
        display: none;
      }

      /* ícone de nota + info da música */
      .mp-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.4);
        display: grid;
        place-items: center;
        font-size: 20px;
        flex-shrink: 0;
      }

      .mp-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .mp-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: #1a1a1a;
        letter-spacing: 0.2px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mp-artist {
        font-size: 0.82rem;
        font-weight: 500;
        color: rgba(0, 0, 0, 0.5);
        letter-spacing: 0.1px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mp-divider {
        width: 1px;
        height: 26px;
        background: rgba(0, 0, 0, 0.12);
        flex-shrink: 0;
      }

      /* botões de controle */
      .mp-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.3);
        display: grid;
        place-items: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s ease, transform 0.1s ease;
        color: #1a1a1a;
        font-size: 18px;
      }

      .mp-btn:active {
        transform: scale(0.9);
        background: rgba(255, 255, 255, 0.5);
      }



      @media (max-width: 720px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }

        .invite {
          gap: 24px;
        }

        .photo-card {
          min-height: 360px;
        }

        .stage-photo {
          text-align: center;
        }

        .stage-photo-content {
          grid-template-columns: 1fr;
          justify-items: center;
        }

        .caption-block {
          max-width: 100%;
          text-align: center;
        }

        .photo-card {
          transform: none;
          width: min(520px, 100%);
        }

        .details-footer {
          grid-template-columns: 1fr minmax(120px, 140px);
          gap: 12px;
          align-items: center;
        }

        .footer-photo {
          max-width: 100%;
          margin: 0;
        }

        .detail-action-label {
          font-size: 0.65rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <img class="luan-fly" src="imagens/luan-voando.png" alt="Luan Santana voando" />
    <audio id="luan-audio" src="imagens/luan-vouvoar.mp3" preload="auto"></audio>
    <button class="sound-toggle" id="sound-toggle" hidden>Ativar som</button>
    <div class="mini-player" id="mini-player" hidden>
      <div class="mp-icon">♪</div>
      <div class="mp-info">
        <span class="mp-title">Vou Voar</span>
        <span class="mp-artist">Luan Santana</span>
      </div>
      <div class="mp-divider"></div>
      <button class="mp-btn" id="mini-play-toggle" aria-label="Pausar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <rect id="pause-bar-1" x="5" y="4" width="4" height="16" rx="1"/>
          <rect id="pause-bar-2" x="15" y="4" width="4" height="16" rx="1"/>
          <path id="play-triangle" d="M6 4l14 8-14 8V4z" style="display:none"/>
        </svg>
      </button>
    </div>
    <div class="copy-toast" id="copy-toast">Endereço copiado!</div>
    <div class="intro-screen">
      <div class="intro-title">Convite especial da Giovana</div>
      <button class="intro-button" id="open-invite">Abrir convite</button>
    </div>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      function App() {
        return (
          <main className="page">
            <section className="stage stage-fly" aria-hidden="true">
              <div className="stage-content"></div>
            </section>

            <section className="stage stage-photo">
              <div className="stage-content stage-photo-content">
                <div className="caption-block">
                  <div className="photo-caption">Você está convidado pro meu aniversário</div>
                </div>
                <div className="photo-card">
                  <img src="imagens/luan-santana3.jpg" alt="Luan Santana" />
                </div>
              </div>
            </section>

            <section className="stage stage-details">
              <div className="balloons" aria-hidden="true">
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
                <span className="balloon"></span>
              </div>
              <div className="stage-content">
                <div className="details-layout">
                  <div className="details-header">
                    <div className="details-title">Giovana faz 20</div>
                    <div className="details-subtitle">Luan Santana Edition</div>
                  </div>
                  <div className="details-grid">
                    <div className="detail-item">
                      <span className="detail-label">Data</span>
                        <span className="detail-value">24/05/26</span>
                    </div>
                    <div className="detail-item">
                      <span className="detail-label">Horário</span>
                      <span className="detail-value">A partir das 12h</span>
                    </div>
                    <div className="detail-item detail-item--full">
                      <span className="detail-label">Local</span>
                      <span className="detail-value">
                        R. Orlando Pacini, 336
                        <br />
                        <span className="detail-value-compact">Vila Melo, Mogi Mirim - SP</span>
                      </span>
                    </div>
                  </div>
                  <div className="detail-item detail-item--actions">
                    <div className="detail-actions" style={{width: '100%', justifyContent: 'center', gap: '24px', flexWrap: 'wrap'}}>
                      <button className="detail-action-btn" id="btn-calendar" aria-label="Adicionar ao calendário" style={{margin: '0'}}>
                        <div className="detail-action-icon">
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                            <line x1="8" y1="14" x2="8" y2="14"/>
                          </svg>
                        </div>
                        <span className="detail-action-label">Adicionar ao<br />calendário</span>
                      </button>
                      <button className="detail-action-btn" id="btn-copy" aria-label="Copiar endereço">
                        <div className="detail-action-icon">
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                          </svg>
                        </div>
                        <span className="detail-action-label">Copiar<br />endereço</span>
                      </button>
                      <a className="detail-action-btn" id="btn-map" href="#" aria-label="Abrir no mapa">
                        <div className="detail-action-icon">
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                          </svg>
                        </div>
                        <span className="detail-action-label">Abrir<br />mapa</span>
                      </a>
                    </div>
                  </div>
                  <div className="details-card">
                    <div className="details-footer">
                      <div className="footer-note">
                        Traga <strong>roupa de banho</strong> e, se quiser beber, traga seu <strong>copo</strong> e a sua
                        <strong> bebida alcoólica</strong>. Confirme sua presença até 20/05.
                      </div>
                      <div className="footer-photo">
                        <img src="imagens/luan-na-piscina.jpg"  alt="Luan Santana na piscina" className="active" />
                        <img src="imagens/luan-na-piscina2.jpg" alt="Luan Santana na piscina" />
                        <img src="imagens/luan-na-piscina3.webp" alt="Luan Santana na piscina" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </main>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);

      const fly = document.querySelector(".luan-fly");
      const audio = document.getElementById("luan-audio");

      const openInvite = document.getElementById("open-invite");

      const markStarted = () => {
        document.body.classList.add("started");
      };

      if (fly && audio && openInvite) {
        const soundToggle    = document.getElementById("sound-toggle");
        const miniPlayer     = document.getElementById("mini-player");
        const miniPlayToggle = document.getElementById("mini-play-toggle");
        const pauseBar1      = document.getElementById("pause-bar-1");
        const pauseBar2      = document.getElementById("pause-bar-2");
        const playTriangle   = document.getElementById("play-triangle");
        let audioUnlocked    = false;

        const setPlayIcon = (playing) => {
          if (!pauseBar1 || !pauseBar2 || !playTriangle) return;
          pauseBar1.style.display    = playing ? "" : "none";
          pauseBar2.style.display    = playing ? "" : "none";
          playTriangle.style.display = playing ? "none" : "";
          miniPlayToggle && miniPlayToggle.setAttribute("aria-label", playing ? "Pausar" : "Tocar");
        };

        const unlockAudio = () => {
          if (audioUnlocked) return Promise.resolve();
          audioUnlocked = true;
          audio.muted = true;
          return (audio.play() || Promise.resolve())
            .catch(() => {})
            .finally(() => {
              audio.pause();
              audio.currentTime = 0;
              audio.muted = false;
            });
        };

        const startAudio = () => {
          const doPlay = () => {
            audio.currentTime = Math.min(6, audio.duration || 0);
            const p = audio.play();
            if (p) p.catch(() => { if (soundToggle) soundToggle.hidden = false; });
            setPlayIcon(true);
          };
          if (audio.readyState >= 3) {
            doPlay();
          } else {
            audio.addEventListener("canplay", doPlay, { once: true });
            audio.load();
          }
        };

        const beginSequence = () => { markStarted(); startAudio(); };

        openInvite.addEventListener("click", () => {
          unlockAudio().finally(() => beginSequence());
        });
        document.addEventListener("touchstart", () => unlockAudio(), { once: true, passive: true });

        if (soundToggle) {
          soundToggle.addEventListener("click", () => { soundToggle.hidden = true; startAudio(); });
        }

        if (miniPlayToggle) {
          miniPlayToggle.addEventListener("click", () => {
            if (audio.paused) { audio.play(); setPlayIcon(true); }
            else              { audio.pause(); setPlayIcon(false); }
          });
        }

        fly.addEventListener("animationend", () => {
          if (miniPlayer) miniPlayer.hidden = false;
        });

        // slideshow das fotos da piscina — aguarda React montar
        setTimeout(() => {
          const slides = document.querySelectorAll(".footer-photo img");
          if (slides.length > 1) {
            let current = 0;
            setInterval(() => {
              slides[current].classList.remove("active");
              current = (current + 1) % slides.length;
              slides[current].classList.add("active");
            }, 2500);
          }
        }, 200);

        // delegação de eventos no document — funciona independente do React
        document.addEventListener("click", (e) => {
          const calBtn = e.target.closest("#btn-calendar");
          if (calBtn) {
            e.preventDefault();
            const ics = [
              "BEGIN:VCALENDAR",
              "VERSION:2.0",
              "PRODID:-//Giovana 20//PT",
              "BEGIN:VEVENT",
              "DTSTART:20260524T120000",
              "DTEND:20260524T210000",
              "SUMMARY:Giovana faz 20",
              "DESCRIPTION:Luan Santana Edition — Traga roupa de banho e sua bebida!",
              "LOCATION:R. Orlando Pacini\\, 336 - Vila Melo\\, Mogi Mirim - SP\\, 13800-382",
              "END:VEVENT",
              "END:VCALENDAR"
            ].join("\r\n");
            const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement("a");
            a.href     = url;
            a.download = "giovana-faz-20.ics";
            a.click();
            URL.revokeObjectURL(url);
          }

          const copyBtn = e.target.closest("#btn-copy");
          if (copyBtn) {
            const text = "R. Orlando Pacini, 336 - Vila Melo, Mogi Mirim - SP, 13800-382";
            if (navigator.clipboard) {
              navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
            } else {
              fallbackCopy(text);
            }
            copyBtn.classList.add("copied");
            const toast = document.getElementById("copy-toast");
            if (toast) {
              toast.classList.add("show");
              clearTimeout(toast._timer);
              toast._timer = setTimeout(() => {
                toast.classList.remove("show");
                copyBtn.classList.remove("copied");
              }, 2000);
            }
          }

          const mapBtn = e.target.closest("#btn-map");
          if (mapBtn) {
            e.preventDefault();
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const addr = encodeURIComponent("R. Orlando Pacini, 336 - Vila Melo, Mogi Mirim - SP, 13800-382");
            window.location.href = isIOS
              ? "https://maps.apple.com/?q=" + addr
              : "https://maps.google.com/?q=" + addr;
          }
        });

        function fallbackCopy(text) {
          const el = document.createElement("textarea");
          el.value = text;
          el.style.position = "fixed";
          el.style.opacity = "0";
          document.body.appendChild(el);
          el.focus();
          el.select();
          document.execCommand("copy");
          document.body.removeChild(el);
        }
      }
    </script>
  </body>
</html>

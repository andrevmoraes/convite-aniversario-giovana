<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giovana 20 - Protótipo (Convite)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --silver: #c7c7c7;
        --silver-dark: #9fa1a6;
        --white: #ffffff;
        --ink: #1b1b1b;
        --shine: #f4f4f4;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Montserrat", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 20%, #ffffff 0%, #f7f7f7 35%, #e9eaee 100%);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .bg-shapes {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .bg-shapes span {
        position: absolute;
        border: 1px solid rgba(199, 199, 199, 0.45);
        border-radius: 999px;
        filter: blur(0.2px);
      }

      .bg-shapes span:nth-child(1) {
        width: 320px;
        height: 320px;
        top: 8%;
        left: -80px;
      }

      .bg-shapes span:nth-child(2) {
        width: 220px;
        height: 220px;
        top: 68%;
        left: 12%;
      }

      .bg-shapes span:nth-child(3) {
        width: 360px;
        height: 360px;
        top: 10%;
        right: -140px;
      }

      .photo-card {
        position: relative;
        border-radius: 24px;
        overflow: hidden;
        border: none;
        background: transparent;
        box-shadow: none;
        min-height: 420px;
        width: min(720px, 100%);
        justify-self: end;
        transform: translateX(6vw);
      }

      .photo-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        mix-blend-mode: multiply;
        filter: contrast(1.05) saturate(1.08);
      }

      .caption-block {
        max-width: 420px;
        justify-self: start;
        text-align: left;
      }

      .photo-caption {
        font-weight: 800;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        font-size: clamp(1.9rem, 3.4vw, 3rem);
        color: #1b1b1b;
        text-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      }

      .prototype-stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 8vw;
        text-align: left;
      }

      .prototype-content {
        width: min(1100px, 100%);
        display: grid;
        grid-template-columns: minmax(220px, 0.9fr) minmax(260px, 1.2fr);
        align-items: center;
        gap: 28px;
      }

      @media (max-width: 720px) {
        .prototype-content {
          grid-template-columns: 1fr;
          justify-items: center;
          text-align: center;
        }

        .caption-block {
          max-width: 100%;
          text-align: center;
        }

        .photo-card {
          transform: none;
          width: min(520px, 100%);
        }

        .photo-card {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <main class="prototype-stage">
      <div class="prototype-content">
        <div class="caption-block">
          <div class="photo-caption">Você está convidado pro meu aniversário</div>
        </div>
        <div class="photo-card">
          <img src="imagens/luan-santana3.jpg" alt="Luan Santana" />
        </div>
      </div>
    </main>
  </body>
</html>
